name: Build VCA Compressor VST3 + Installer
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build and Package Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup VST3 SDK
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/steinbergmedia/vst3sdk/archive/refs/tags/v3.7.9_build-61.zip" -OutFile vst3sdk.zip
          Expand-Archive -Path vst3sdk.zip -DestinationPath .
          # On deplace le contenu pour avoir un chemin simple
          $folder = Get-ChildItem -Directory -Filter "vst3sdk-*" | Select-Object -First 1
          Move-Item -Path "$($folder.FullName)" -Destination "vst3sdk"

      - name: Configure CMake
        shell: cmd
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DVST3_SDK_ROOT=%GITHUB_WORKSPACE%/vst3sdk -DSMTG_ADD_VSTGUI=OFF -DSMTG_CREATE_BUNDLE_FOR_WINDOWS=ON

      - name: Build plugin
        shell: cmd
        run: cmake --build build --config Release --parallel

      - name: Find and stage VST3
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem -Path build -Recurse -Filter "*.vst3" | Select-Object -First 1 -ExpandProperty FullName
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item -Recurse -Force $vst3 staging/

      - name: Install Inno Setup
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile innosetup.exe
          Start-Process -FilePath innosetup.exe -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

      - name: Create installer script
        shell: pwsh
        run: |
          $iss = @"
          [Setup]
          AppName=VCA Compressor
          AppVersion=1.0.0
          AppPublisher=YourStudio
          DefaultDirName={commonpf64}\VCA Compressor
          OutputDir=installer_output
          OutputBaseFilename=VCACompressor_v1.0.0_Setup
          Compression=lzma2/ultra64
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64
          WizardStyle=modern
          DisableProgramGroupPage=yes
          [Languages]
          Name: french; MessagesFile: compiler:Languages\French.isl
          Name: english; MessagesFile: compiler:Default.isl
          [Files]
          Source: staging\*; DestDir: {cf}\VST3\; Flags: ignoreversion recursesubdirs createallsubdirs
          [Icons]
          Name: {group}\Uninstall VCA Compressor; Filename: {uninstallexe}
          "@
          $iss | Out-File -FilePath setup.iss -Encoding utf8

      - name: Build installer
        shell: cmd
        run: "\"C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe\" setup.iss"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VCACompressor-Windows-x64
          path: installer_output/*.exe
          retention-days: 30
