name: Build VCA Compressor VST3 + Installer
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build and Package Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup VST3 SDK
        shell: pwsh
        run: |
          # Téléchargement du SDK principal via branche master pour éviter les 404
          Invoke-WebRequest -Uri "https://github.com/steinbergmedia/vst3sdk/archive/refs/heads/master.zip" -OutFile sdk.zip
          Expand-Archive -Path sdk.zip -DestinationPath .
          $sdkFolder = Get-ChildItem -Directory -Filter "vst3sdk-*" | Select-Object -First 1
          Rename-Item -Path $sdkFolder.FullName -NewName "vst3sdk"

          # Téléchargement de VSTGUI (obligatoire pour beaucoup de projets)
          cd vst3sdk
          Invoke-WebRequest -Uri "https://github.com/steinbergmedia/vstgui/archive/refs/heads/master.zip" -OutFile vstgui.zip
          Expand-Archive -Path vstgui.zip -DestinationPath .
          $guiFolder = Get-ChildItem -Directory -Filter "vstgui-*" | Select-Object -First 1
          Rename-Item -Path $guiFolder.FullName -NewName "vstgui"

      - name: Configure CMake
        shell: cmd
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DVST3_SDK_ROOT=%GITHUB_WORKSPACE%\vst3sdk -DSMTG_ADD_VSTGUI=ON -DSMTG_CREATE_BUNDLE_FOR_WINDOWS=ON

      - name: Build plugin
        shell: cmd
        run: cmake --build build --config Release --parallel

      - name: Find and stage VST3
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem -Path build -Recurse -Filter "*.vst3" | Where-Object { $_.FullName -like "*Release*" } | Select-Object -First 1 -ExpandProperty FullName
          if (-not $vst3) { Write-Error "VST3 non généré dans le dossier build"; exit 1 }
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item -Recurse -Force $vst3 staging/

      - name: Install Inno Setup
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile innosetup.exe
          Start-Process -FilePath innosetup.exe -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

      - name: Create installer script
        shell: pwsh
        run: |
          $iss = @"
          [Setup]
          AppName=VCA Compressor
          AppVersion=1.0.0
          DefaultDirName={commonpf64}\VCA Compressor
          OutputDir=installer_output
          OutputBaseFilename=VCACompressor_Setup
          Compression=lzma2/ultra64
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64
          [Files]
          Source: "staging\*"; DestDir: "{cf}\VST3\"; Flags: ignoreversion recursesubdirs createallsubdirs
          "@
          $iss | Out-File -FilePath setup.iss -Encoding utf8

      - name: Build installer
        shell: cmd
        run: "\"C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe\" setup.iss"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VCACompressor-Windows-x64
          path: installer_output/*.exe
