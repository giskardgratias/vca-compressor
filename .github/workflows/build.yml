name: Build VCA Compressor VST3 + Installer
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build and Package Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache VST3 SDK
        id: cache-vst3sdk
        uses: actions/cache@v4
        with:
          path: vst3sdk
          key: vst3sdk-v3.7.9

      - name: Clone VST3 SDK
        if: steps.cache-vst3sdk.outputs.cache-hit != 'true'
        shell: cmd
        run: git clone --recursive --depth 1 --branch v3.7.9 https://github.com/steinbergmedia/vst3sdk.git vst3sdk

      - name: Configure CMake
        shell: cmd
        run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DVST3_SDK_ROOT=%GITHUB_WORKSPACE%/vst3sdk -DSMTG_ADD_VSTGUI=OFF -DSMTG_CREATE_BUNDLE_FOR_WINDOWS=ON

      - name: Build plugin
        shell: cmd
        run: cmake --build build --config Release --parallel

      - name: Find and stage VST3
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem -Path build -Recurse -Filter "*.vst3" | Select-Object -First 1 -ExpandProperty FullName
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item -Recurse -Force $vst3 staging/

      - name: Install Inno Setup
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile innosetup.exe
          Start-Process -FilePath innosetup.exe -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

      - name: Create installer script
        shell: cmd
        run: |
          echo [Setup] > setup.iss
          echo AppName=VCA Compressor >> setup.iss
          echo AppVersion=1.0.0 >> setup.iss
          echo AppPublisher=YourStudio >> setup.iss
          echo DefaultDirName={commonpf64}\VCA Compressor >> setup.iss
          echo OutputDir=installer_output >> setup.iss
          echo OutputBaseFilename=VCACompressor_v1.0.0_Setup >> setup.iss
          echo Compression=lzma2/ultra64 >> setup.iss
          echo SolidCompression=yes >> setup.iss
          echo ArchitecturesInstallIn64BitMode=x64 >> setup.iss
          echo WizardStyle=modern >> setup.iss
          echo DisableProgramGroupPage=yes >> setup.iss
          echo [Languages] >> setup.iss
          echo Name: "french"; MessagesFile: "compiler:Languages\French.isl" >> setup.iss
          echo Name: "english"; MessagesFile: "compiler:Default.isl" >> setup.iss
          echo [Files] >> setup.iss
          echo Source: "staging\*"; DestDir: "{cf}\VST3\"; Flags: ignoreversion recursesubdirs createallsubdirs >> setup.iss
          echo [Icons] >> setup.iss
          echo Name: "{group}\Uninstall VCA Compressor"; Filename: "{uninstallexe}" >> setup.iss

      - name: Build installer
        shell: cmd
        run: "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VCACompressor-Windows-x64
          path: installer_output/*.exe
          retention-days: 30
