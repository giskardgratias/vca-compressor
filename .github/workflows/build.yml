name: Build VCA Compressor VST3 + Installer
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build and Package Windows x64
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Checkout VST3 SDK (Recursive)
        shell: bash
        run: |
          # Clonage récursif pour obtenir tous les fichiers de configuration CMake
          git clone --recursive https://github.com/steinbergmedia/vst3sdk.git vst3sdk

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -G Ninja -B build ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DVST3_SDK_ROOT="%GITHUB_WORKSPACE%\vst3sdk" ^
          -DSMTG_ADD_VSTGUI=ON ^
          -DSMTG_CREATE_BUNDLE_FOR_WINDOWS=ON

      - name: Build plugin
        shell: cmd
        run: cmake --build build --config Release --parallel

      - name: Find and stage VST3
        shell: pwsh
        run: |
          $vst3 = Get-ChildItem -Path build -Recurse -Filter "*.vst3" | Where-Object { $_.FullName -like "*Release*" -or $_.FullName -like "*vst3*" } | Select-Object -First 1 -ExpandProperty FullName
          if (-not $vst3) { throw "Plugin VST3 introuvable." }
          New-Item -ItemType Directory -Force -Path staging
          if (Test-Path "$vst3\*") { Copy-Item -Recurse -Force "$vst3" staging/ } else { Copy-Item -Force "$vst3" staging/ }

      - name: Install Inno Setup
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile innosetup.exe
          Start-Process -FilePath innosetup.exe -ArgumentList "/VERYSILENT /SUPPRESSMSGBOXES /NORESTART" -Wait

      - name: Create installer script
        shell: pwsh
        run: |
          $iss = @"
          [Setup]
          AppName=VCA Compressor
          AppVersion=1.0.0
          DefaultDirName={commonpf64}\VCA Compressor
          OutputDir=installer_output
          OutputBaseFilename=VCACompressor_Setup
          Compression=lzma2/ultra64
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64
          [Files]
          Source: "staging\*"; DestDir: "{cf}\VST3\"; Flags: ignoreversion recursesubdirs createallsubdirs
          "@
          $iss | Out-File -FilePath setup.iss -Encoding utf8

      - name: Build installer
        shell: cmd
        run: "\"C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe\" setup.iss"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VCACompressor-Windows-x64
          path: installer_output/*.exe
